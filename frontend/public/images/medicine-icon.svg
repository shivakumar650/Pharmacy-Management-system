<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="medicineIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Medicine bottle -->
  <rect x="75" y="40" width="50" height="120" fill="url(#medicineIcon)" rx="8"/>
  <rect x="85" y="30" width="30" height="20" fill="url(#medicineIcon)" rx="15"/>

  <!-- Bottle cap -->
  <rect x="82" y="25" width="36" height="10" fill="#047857" rx="5"/>

  <!-- Pills -->
  <circle cx="95" cy="80" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="105" cy="100" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="95" cy="120" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="105" cy="140" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Label -->
  <rect x="80" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" rx="2"/>
</svg>