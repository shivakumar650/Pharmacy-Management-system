<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alertIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Clock face -->
  <circle cx="100" cy="100" r="60" fill="url(#alertIcon)"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>

  <!-- Clock hands -->
  <rect x="98" y="100" width="4" height="30" fill="#ffffff" rx="2"/>
  <rect x="100" y="98" width="20" height="4" fill="#ffffff" rx="2"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="#ffffff"/>

  <!-- Hour markers -->
  <circle cx="100" cy="55" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="130" cy="70" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="145" cy="100" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="130" cy="130" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="100" cy="145" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="70" cy="130" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="55" cy="100" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="70" cy="70" r="2" fill="#ffffff" opacity="0.6"/>

  <!-- Exclamation mark -->
  <rect x="95" y="75" width="10" height="25" fill="#ffffff" rx="5"/>
  <circle cx="100" cy="110" r="3" fill="#ffffff"/>
</svg>