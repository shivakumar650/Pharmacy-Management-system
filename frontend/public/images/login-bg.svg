<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="loginGradient1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.05" />
    </radialGradient>
    <radialGradient id="loginGradient2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:0.05" />
    </radialGradient>
    <pattern id="medicalPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="1.5" fill="#ffffff" opacity="0.1"/>
      <path d="M20 40 L30 30 L50 50 L60 40" stroke="#ffffff" stroke-width="0.5" opacity="0.08" fill="none"/>
      <path d="M70 20 L80 30 L90 20 L100 30" stroke="#ffffff" stroke-width="0.5" opacity="0.06" fill="none"/>
    </pattern>
  </defs>

  <!-- Background gradients -->
  <rect width="1200" height="800" fill="url(#loginGradient1)"/>
  <rect width="1200" height="800" fill="url(#loginGradient2)"/>

  <!-- Medical pattern overlay -->
  <rect width="1200" height="800" fill="url(#medicalPattern)"/>

  <!-- Decorative medical elements -->
  <g opacity="0.1">
    <!-- Cross symbols -->
    <g transform="translate(100, 100)">
      <rect x="8" y="5" width="4" height="20" fill="#ffffff"/>
      <rect x="5" y="8" width="20" height="4" fill="#ffffff"/>
    </g>
    <g transform="translate(300, 200)">
      <rect x="6" y="4" width="3" height="15" fill="#ffffff"/>
      <rect x="4" y="6" width="15" height="3" fill="#ffffff"/>
    </g>
    <g transform="translate(800, 150)">
      <rect x="7" y="4.5" width="3.5" height="18" fill="#ffffff"/>
      <rect x="4.5" y="7" width="18" height="3.5" fill="#ffffff"/>
    </g>
    <g transform="translate(1000, 400)">
      <rect x="5.5" y="3.5" width="2.5" height="13" fill="#ffffff"/>
      <rect x="3.5" y="5.5" width="13" height="2.5" fill="#ffffff"/>
    </g>

    <!-- Pill shapes -->
    <ellipse cx="200" cy="500" rx="8" ry="4" fill="#ffffff" opacity="0.08"/>
    <ellipse cx="600" cy="300" rx="6" ry="3" fill="#ffffff" opacity="0.06"/>
    <ellipse cx="900" cy="600" rx="10" ry="5" fill="#ffffff" opacity="0.07"/>
    <ellipse cx="1100" cy="200" rx="7" ry="3.5" fill="#ffffff" opacity="0.05"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.12">
    <circle cx="150" cy="120" r="2" fill="#ffffff"/>
    <circle cx="400" cy="280" r="1.5" fill="#ffffff"/>
    <circle cx="700" cy="180" r="2.5" fill="#ffffff"/>
    <circle cx="950" cy="420" r="1.8" fill="#ffffff"/>
    <circle cx="1150" cy="320" r="2.2" fill="#ffffff"/>
    <circle cx="300" cy="650" r="1.3" fill="#ffffff"/>
    <circle cx="850" cy="550" r="2.8" fill="#ffffff"/>
  </g>
</svg>