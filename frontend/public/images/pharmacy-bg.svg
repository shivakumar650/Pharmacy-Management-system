<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pharmacyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0.1" />
    </linearGradient>
    <pattern id="pharmacyPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="2" fill="#ffffff" opacity="0.1"/>
      <circle cx="20" cy="80" r="1.5" fill="#ffffff" opacity="0.08"/>
      <circle cx="80" cy="20" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#pharmacyGradient)"/>

  <!-- Pharmacy-themed pattern -->
  <rect width="1920" height="1080" fill="url(#pharmacyPattern)"/>

  <!-- Decorative elements -->
  <g opacity="0.05">
    <!-- Medicine bottles -->
    <rect x="100" y="200" width="8" height="40" fill="#ffffff" rx="2"/>
    <rect x="108" y="195" width="4" height="8" fill="#ffffff" rx="1"/>
    <rect x="300" y="400" width="6" height="35" fill="#ffffff" rx="2"/>
    <rect x="306" y="395" width="3" height="6" fill="#ffffff" rx="1"/>
    <rect x="800" y="150" width="7" height="38" fill="#ffffff" rx="2"/>
    <rect x="807" y="145" width="4" height="7" fill="#ffffff" rx="1"/>
    <rect x="1200" y="500" width="5" height="32" fill="#ffffff" rx="2"/>
    <rect x="1205" y="495" width="3" height="5" fill="#ffffff" rx="1"/>
    <rect x="1600" y="300" width="8" height="42" fill="#ffffff" rx="2"/>
    <rect x="1608" y="295" width="4" height="8" fill="#ffffff" rx="1"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.08">
    <circle cx="200" cy="150" r="3" fill="#ffffff"/>
    <circle cx="500" cy="350" r="2" fill="#ffffff"/>
    <circle cx="900" cy="200" r="4" fill="#ffffff"/>
    <circle cx="1300" cy="450" r="2.5" fill="#ffffff"/>
    <circle cx="1700" cy="250" r="3.5" fill="#ffffff"/>
  </g>
</svg>